name: compat

on:
  workflow_dispatch:
    inputs:
      branchName:
        description: 'Nock branch to run the compatibility tests against (defaults to the default branch)'
        required: false
        type: string

jobs:
  nock:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Pack
        run: npm pack

      - name: Nock tests
        run: ./test/third-party/nock.sh ${{ inputs.branchName }}
