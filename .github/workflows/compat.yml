name: compat

on:
  workflow_dispatch:
    inputs:
      branchName:
        description: 'Nock branch to run the compatibility tests against (defaults to the default branch)'
        required: false
        type: string

jobs:
  nock:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.5.2

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Pack
        run: npm pack

      - name: Nock tests
        run: ./test/third-party/nock.sh ${{ inputs.branchName }}
